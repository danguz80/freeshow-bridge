<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo Ticker (1 line)</title>
  <style>
    body{ background:#0b0b0b; margin:0; overflow:hidden; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color:#fff; }
    .frame{ width:1920px; height:300px; padding:34px 58px; box-sizing:border-box; }
    .tickerWrap{ width:100%; overflow:hidden; border-top:3px solid rgba(125,211,252,.30); border-bottom:3px solid rgba(125,211,252,.30); padding:14px 0; }
    .ticker{ display:inline-block; white-space:nowrap; font-weight:900; letter-spacing:.5px; will-change:transform; font-size:66px;
             animation: scroll 28s linear infinite; }
    @keyframes scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

    /* Inline header (mismo look URL 1) */
    .inlineHeader{
      color:#7dd3fc; text-transform:uppercase; font-weight:900;
      text-decoration:underline; text-decoration-thickness:4px; text-underline-offset:10px;
      letter-spacing:1px; margin-right:18px;
    }
    .tokenTitle{ text-transform:uppercase; font-weight:900; }
    .tokenSuffix{ color:#fbbf24; font-weight:900; }
    .sep{ opacity:.55; padding:0 26px; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="tickerWrap">
      <div class="ticker">
        <span id="line"></span>
        <span class="sep">•</span>
        <span id="line2"></span>
      </div>
    </div>
  </div>

  <script>
    // Demo data (simula el formato real: TÍTULO - acorde)
    const coro = [
      "SANTO POR SIEMPRE - C#m",
      "A JESUCRISTO - G",
      "TE EXALTAMOS - D",
      "GLORIA EN LO ALTO - Bb"
    ];
    const conjunto = [
      "ABRE MIS OJOS - E",
      "TU AMOR NO FALLA - A",
      "CUAN GRANDE ES EL - F",
      "ERES BUENO - Bm",
      "MI RESPIRAR - C",
      "GRACIA SUBLIME - D"
    ];

    function tokenize(text){
      const idx = text.indexOf(" - ");
      const left = (idx>=0 ? text.slice(0, idx) : text).toUpperCase();
      const right = (idx>=0 ? text.slice(idx) : ""); // acorde tal cual
      return `<span class="tokenTitle">${left}</span><span class="tokenSuffix">${right}</span>`;
    }
    function list(names){
      return names.map(tokenize).join(`<span class="sep">•</span>`);
    }
    function labeled(label, names){
      return `<span class="inlineHeader">${label}:</span>${list(names)}`;
    }

    const html = labeled("Coro", coro) + `<span class="sep">•</span>` + labeled("Conjunto", conjunto);
    document.getElementById("line").innerHTML = html;
    document.getElementById("line2").innerHTML = html;
  </script>
</body>
</html>
