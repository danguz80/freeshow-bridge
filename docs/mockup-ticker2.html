<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo Ticker (2 lines)</title>
  <style>
    body{ background:#0b0b0b; margin:0; overflow:hidden; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color:#fff; }
    .frame{ width:1920px; height:420px; padding:34px 58px; box-sizing:border-box; }

    .row{ margin-top:22px; }
    .tickerWrap{ width:100%; overflow:hidden; border-top:3px solid rgba(125,211,252,.30); border-bottom:3px solid rgba(125,211,252,.30); padding:14px 0; height:112px; }
    .ticker{ display:inline-block; white-space:nowrap; font-weight:900; letter-spacing:.5px; will-change:transform; font-size:60px; }
    .speedA{ animation: scrollA 26s linear infinite; }
    .speedB{ animation: scrollB 32s linear infinite; }
    @keyframes scrollA { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    @keyframes scrollB { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

    .inlineHeader{
      color:#7dd3fc; text-transform:uppercase; font-weight:900;
      text-decoration:underline; text-decoration-thickness:4px; text-underline-offset:10px;
      letter-spacing:1px; margin-right:18px;
    }
    .tokenTitle{ text-transform:uppercase; font-weight:900; }
    .tokenSuffix{ color:#fbbf24; font-weight:900; }
    .sep{ opacity:.55; padding:0 26px; }
  </style>
</head>
<body>
  <div class="frame">

    <div class="row">
      <div class="tickerWrap">
        <div class="ticker speedA">
          <span id="coroLine"></span><span class="sep">•</span><span id="coroLine2"></span>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="tickerWrap">
        <div class="ticker speedB">
          <span id="conjLine"></span><span class="sep">•</span><span id="conjLine2"></span>
        </div>
      </div>
    </div>

  </div>

  <script>
    const coro = [
      "SANTO POR SIEMPRE - C#m",
      "A JESUCRISTO - G",
      "TE EXALTAMOS - D",
      "GLORIA EN LO ALTO - Bb"
    ];
    const conjunto = [
      "ABRE MIS OJOS - E",
      "TU AMOR NO FALLA - A",
      "CUAN GRANDE ES EL - F",
      "ERES BUENO - Bm",
      "MI RESPIRAR - C",
      "GRACIA SUBLIME - D",
      "INAGOTABLE - G/B"
    ];

    function tokenize(text){
      const idx = text.indexOf(" - ");
      const left = (idx>=0 ? text.slice(0, idx) : text).toUpperCase();
      const right = (idx>=0 ? text.slice(idx) : "");
      return `<span class="tokenTitle">${left}</span><span class="tokenSuffix">${right}</span>`;
    }
    function list(names){
      return names.map(tokenize).join(`<span class="sep">•</span>`);
    }
    function labeled(label, names){
      return `<span class="inlineHeader">${label}:</span>${list(names)}`;
    }

    const coroHtml = labeled("Coro", coro);
    const conjHtml = labeled("Conjunto", conjunto);

    document.getElementById("coroLine").innerHTML = coroHtml;
    document.getElementById("coroLine2").innerHTML = coroHtml;

    document.getElementById("conjLine").innerHTML = conjHtml;
    document.getElementById("conjLine2").innerHTML = conjHtml;
  </script>
</body>
</html>
